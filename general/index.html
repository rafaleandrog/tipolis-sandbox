<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Tipolis — Strategic Capital Proposal 2026</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ── ANIMATED NUMBER ── */
function AnimNum({target,prefix="",suffix="",dur=1500,go}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    if(!go)return;
    const t=parseFloat(target),s=performance.now();
    const step=n=>{const p=Math.min((n-s)/dur,1),e=1-Math.pow(1-p,3);setVal(e*t);if(p<1)requestAnimationFrame(step);else setVal(t);};
    requestAnimationFrame(step);
  },[go,target,dur]);
  const d=Number.isInteger(parseFloat(target))?Math.round(val):Number(val).toFixed(1);
  return<>{prefix}{d}{suffix}</>;
}

/* ── RISK CARD ── */
function Risk({level,color,title,badge,body}){
  return(
    <div style={{display:"flex",gap:14,padding:"16px 18px",background:"#003050",borderRadius:2,marginBottom:10,borderLeft:`3px solid ${color}`}}>
      <div style={{width:9,height:9,borderRadius:"50%",background:color,marginTop:4,flexShrink:0}}/>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:3}}>{title}</div>
        <div style={{display:"inline-block",fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:1,padding:"2px 8px",borderRadius:2,marginBottom:5,textTransform:"uppercase",background:color+"18",color}}>{badge}</div>
        <div style={{fontSize:12,color:"#7A8A9E",lineHeight:1.6}}>{body}</div>
      </div>
    </div>
  );
}

/* ── IBADGE ── */
function IBadge({label,color="#FF6B35"}){

    <div style={{display:"inline-flex",alignItems:"center",gap:7,borderRadius:2,padding:"5px 13px",marginBottom:22,background:color+"14",border:"1px solid "+color+"40"}}>

    </div>
  );
}

/* ── INTERACTIVE CALC ── */
function InteractiveCalc(){
  const [aum,setAum]=useState("500");
  const [fixedOpex,setFixedOpex]=useState("545");
  const [varRate,setVarRate]=useState("0.015");
  const [pct,setPct]=useState(1.0);
  const aumN=parseFloat(aum.replace(/,/g,""))||0;
  const fixN=parseFloat(fixedOpex)||0;
  const varN=parseFloat(varRate)||0;
  const grossRev=aumN*1e6*pct/100;
  const tipolis=grossRev*0.25;
  const jvRev=grossRev*0.75;
  const varOpex=aumN*1e6*varN/100;
  const fixOpex=fixN*1000;
  const jvNet=jvRev-fixOpex-varOpex;
  const jvMargin=jvRev>0?(jvNet/jvRev*100):0;
  const fmt=n=>{if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+"B";if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+"M";if(Math.abs(n)>=1e3)return(n/1e3).toFixed(0)+"K";return n.toFixed(0);};
  return(
    <div style={{background:"#001829",border:"1px solid rgba(255,107,53,.25)",borderRadius:3,padding:"22px",marginTop:20}}>
      <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FF6B35",letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>Interactive Revenue Calculator</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
        {[["AUM ($M)",aum,setAum],["Digital Bank Fixed OpEx ($K/yr)",fixedOpex,setFixedOpex],["Variable OpEx (% AUM)",varRate,setVarRate]].map(([l,v,s])=>(
          <div key={l}><div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#7A8A9E",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>{l}</div>
          <input value={v} onChange={e=>s(e.target.value)} style={{width:"100%",background:"#001E35",border:"1px solid rgba(255,255,255,.1)",borderRadius:2,padding:"8px 10px",color:"#FFF",fontFamily:"'DM Mono',monospace",fontSize:13,outline:"none"}}/></div>
        ))}
      </div>
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#7A8A9E",letterSpacing:1.5,textTransform:"uppercase"}}>Gross Revenue % of AUM</div>
          <div style={{fontSize:13,fontFamily:"'DM Mono',monospace",color:"#FF6B35",fontWeight:700}}>{pct.toFixed(2)}%</div>
        </div>
        <input type="range" min="0.5" max="2.5" step="0.05" value={pct} onChange={e=>setPct(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#FF6B35",cursor:"pointer"}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#8A9AAE",fontFamily:"'DM Mono',monospace",marginTop:3}}><span>0.5%</span><span style={{color:"#9A8AAE"}}>← drag</span><span>2.5%</span></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[["#FFF","Gross Revenue",fmt(grossRev),"Total spread"],["#A78BFA","→ Tipolis (25%)",fmt(tipolis),"0.25% AUM"],["#0D9E8E","Digital Bank Revenue (75%)",fmt(jvRev),"Before costs"],[jvNet>=0?"#2ECC71":"#E74C3C","Partner Net Profit",(jvNet>=0?"+":"")+fmt(jvNet),`Partner Margin: ${jvMargin.toFixed(1)}%`]].map(([col,lbl,val,sub])=>(
          <div key={lbl} style={{background:"#002040",border:"1px solid rgba(255,255,255,.06)",borderRadius:2,padding:"12px 14px"}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#7A8A9E",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{lbl}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:col,lineHeight:1,marginBottom:2}}>{val}</div>
            <div style={{fontSize:9,color:"#5A6A7A"}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["Digital Bank Fixed OpEx",fmt(fixOpex)],["Digital Bank Variable OpEx",fmt(varOpex)]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#5A6A7A",padding:"6px 10px",background:"rgba(255,255,255,.02)",borderRadius:2}}>
            <span>{l}</span><span style={{fontFamily:"'DM Mono',monospace"}}>{v}</span>
          </div>
        ))}
      </div>
      <p style={{fontSize:10,color:"#8A9AAE",marginTop:10,fontStyle:"italic",lineHeight:1.5}}>Gross Revenue = AUM × %. Tipolis = 25% of Gross. Digital Bank Net = Digital Bank Revenue – Fixed – Variable OpEx.</p>
    </div>
  );
}

/* ── CUSTOM ALLOCATION BAR ── */
function CustomAllocationBar(){
  const strcY=11.5,tbillY=3.70;
  const [pct,setPct]=useState(50);
  const [inputVal,setInputVal]=useState("50");
  const handleSlider=e=>{const v=Number(e.target.value);setPct(v);setInputVal(String(v));};
  const handleInput=e=>{const v=Math.min(100,Math.max(0,Number(e.target.value)||0));setPct(v);setInputVal(e.target.value);};
  const blended=pct/100*strcY+(1-pct/100)*tbillY;
  const cf=100*blended/100;
  const afterTax=(pct/100)*strcY+(1-pct/100)*tbillY*(1-0.21);
  const barPct=(blended/strcY)*100;
  const getColor=()=>pct>60?"#2ECC71":pct>30?"#F5A623":"#FF6B35";
  return(
    <div style={{background:"rgba(13,158,142,.06)",border:"1px solid rgba(13,158,142,.2)",borderRadius:2,padding:"16px 18px",marginTop:14}}>
      <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#0D9E8E",letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Custom Allocation — $100M Portfolio</div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:10,flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#7A8A9E"}}>STRC %</span>
        <input type="range" min={0} max={100} value={pct} onChange={handleSlider} style={{width:180,accentColor:"#0D9E8E",cursor:"pointer"}}/>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <input type="number" min={0} max={100} value={inputVal} onChange={handleInput} style={{width:54,background:"transparent",border:"1px solid rgba(13,158,142,.4)",borderRadius:2,color:"#0D9E8E",fontFamily:"'DM Mono',monospace",fontSize:13,padding:"3px 7px",textAlign:"center"}}/>
          <span style={{fontSize:12,color:"#7A8A9E"}}>%</span>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
        <span style={{fontSize:13,color:"#C8D4E0",fontWeight:500}}>{pct}% STRC / {100-pct}% T-Bills</span>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:getColor()}}>${cf.toFixed(1)}M</span>
      </div>
      <div style={{background:"rgba(255,255,255,.06)",borderRadius:2,height:8,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:2,width:Math.min(barPct,100)+"%",background:getColor(),transition:"width .4s cubic-bezier(.16,1,.3,1)"}}/>
      </div>
      <div style={{display:"flex",gap:18,marginTop:6,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#7A8A9E"}}>Yield: <strong style={{color:"#C8D4E0"}}>{blended.toFixed(2)}%</strong></span>
        <span style={{fontSize:11,color:"#7A8A9E"}}>Cash Flow: <strong style={{color:"#C8D4E0"}}>${cf.toFixed(1)}M</strong></span>
        <span style={{fontSize:11,color:"#7A8A9E"}}>After-tax: <strong style={{color:"#C8D4E0"}}>${afterTax.toFixed(1)}M</strong></span>
      </div>
    </div>
  );
}

/* ── FUNNEL VISUALIZATION ── */
function MarketFunnel({items}){
  return(
    <div style={{margin:"36px auto",maxWidth:640}}>
      <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"#A78BFA",letterSpacing:2,textTransform:"uppercase",marginBottom:24,textAlign:"center"}}>Market Funnel — TAM → SAM → SOM</div>
      {items.map((item,i)=>{
        const topPct=item.topW;
        const botPct=item.botW;
        const h=item.h;
        return(
          <div key={item.label} style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:0}}>
            <svg width="100%" viewBox={`0 0 600 ${h+4}`} style={{display:"block",overflow:"visible"}}>
              <defs>
                <linearGradient id={`fg${i}`} x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stopColor={item.color} stopOpacity="0.35"/>
                  <stop offset="100%" stopColor={item.color} stopOpacity="0.15"/>
                </linearGradient>
              </defs>
              {/* trapezoid */}
              <polygon
                points={`${(600-topPct*6)/2},2 ${(600+topPct*6)/2},2 ${(600+botPct*6)/2},${h+2} ${(600-botPct*6)/2},${h+2}`}
                fill={`url(#fg${i})`}
                stroke={item.color}
                strokeWidth="1.5"
                strokeOpacity="0.6"
              />
              {/* label center */}
              <text x="300" y={h/2+2} textAnchor="middle" dominantBaseline="middle" fontSize="13" fontWeight="700" fill="#FFF" fontFamily="'DM Mono',monospace">{item.val}</text>
              <text x="300" y={h/2+18} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill={item.color} fontFamily="'DM Mono',monospace" letterSpacing="2" textTransform="uppercase">{item.label}</text>
            </svg>
            {i<items.length-1&&(
              <svg width="30" height="20" viewBox="0 0 30 20" style={{display:"block"}}>
                <polygon points="5,0 25,0 15,18" fill={item.color} opacity="0.4"/>
              </svg>
            )}
          </div>
        );
      })}
    </div>
  );
}

      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(28px,4vw,44px)",lineHeight:.95,marginBottom:14}}>From BitBonds to<br/><span style={{color:"#3B82F6"}}>City Bonds</span></h2>

      {/* BitBonds explanation */}
      <div style={{background:"rgba(59,130,246,.04)",border:"1px solid rgba(59,130,246,.18)",borderRadius:2,padding:"22px 26px",marginBottom:22}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#60A5FA",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>The Original Concept — BitBonds (US Treasury Proposal, 2025)</div>
        <p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:12}}>In 2025, following President Trump's Executive Order establishing the US Strategic Bitcoin Reserve, a structural innovation was proposed for US sovereign debt: <strong>Bitcoin-Enhanced Treasury Bonds ("BitBonds")</strong>. The core thesis was simple but powerful — America faces trillions in debt refinancing obligations at high interest rates. What if some of that debt could be issued at <em>lower coupons</em> in exchange for giving investors <em>partial upside in Bitcoin appreciation?</em></p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
          {[
            {n:"50-90%",label:"Conventional Funding",desc:"50-90% of bond proceeds finance normal government operations — no change to fiscal mechanics.",color:"#3B82F6"},

        <div style={{background:"rgba(59,130,246,.07)",border:"1px solid rgba(59,130,246,.2)",borderRadius:2,padding:"12px 16px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#60A5FA",marginBottom:6}}>The Economics at $2T Scale (US Federal Analysis)</div>
          <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75}}>Issuing $2 trillion in BitBonds instead of conventional Treasuries generates <strong>$70B/year in interest savings</strong> — the lower coupon cost outweighs the BTC allocation cost. Over 10 years: $700B nominal savings, $554B present value. Even if Bitcoin stays flat, net taxpayer savings of $354B after accounting for the initial BTC purchase. Under median Bitcoin growth scenarios, the government's share of appreciation is sufficient to substantially reduce the entire federal debt burden.</div>
        </div>
        <div style={{fontSize:12,color:"#7A8A9E",lineHeight:1.75}}>The mechanism is self-reinforcing: coupons are paid in fiat (which governments can always print); Bitcoin reserves are never sold; as BTC appreciates, the balance sheet strengthens; new issuance occurs at better terms; more Bitcoin is pulled off the market into reserves, amplifying scarcity and driving price further. <strong>Debt becomes self-amortizing against scarcity.</strong> MicroStrategy proved this at the corporate level. BitBonds proposed it at sovereign scale.</div>

        <div style={{fontSize:14,fontWeight:700,color:"#FFF",marginBottom:12}}>City Bonds apply the exact same architecture — at the city level, via the Digital Bank's investment banking layer.</div>
        <p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:16}}>International Cities face the same structural challenge as sovereign governments, in miniature: they need to finance expensive upfront infrastructure — land development, energy grids, public services, roads — but lack the credit history or scale to tap conventional capital markets at competitive rates. City Bonds solve this by offering investors something conventional city bonds never could: <strong>a lower base coupon in exchange for partial participation in Bitcoin's long-term appreciation</strong>, structured through the same STRC-backed Digital Bank that already powers SATS.</p>

        <div style={{fontSize:10,color:"#9AAABB",fontStyle:"italic",marginTop:4,marginBottom:28}}>Ops Return = P × rate p.a. × years (coupon on total invested). BTC Gross = P × BTC allocation × ((1+CAGR)^years − 1) (compound). Investor receives 50% of BTC Gross. IRR = annualized return on P=$100,000.</div>

          {(function(){

            var maxVal=0;

          <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75}}>The US municipal bond market exceeds <strong>$4 trillion</strong>. Every major city raises infrastructure capital through debt backed by future revenue streams. The structural cost: rating agencies, underwriters, and public debt markets extract 2–4% before the first investor receives yield. <strong>City Bonds eliminate every intermediary.</strong> Tipolis issues directly to its resident and investor base — lower cost of capital, faster deployment, no external approval — from investors who are already financially aligned with the city’s success.</div>

          <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75}}>Firms like Brookfield Infrastructure, Global Infrastructure Partners, and Macquarie built trillion-dollar businesses on one insight: infrastructure generates predictable, inflation-linked cash flows that institutions will price at a premium. Their financial engineering — asset-backed debt, tranched returns, blended equity — makes projects viable that sovereigns cannot fund. <strong>Tipolis already possesses what these firms spend decades acquiring:</strong> a captive demand base, a jurisdiction, a governance framework, and the residents who will live in the infrastructure they’re financing. City Bonds are Tipolis’s version of this playbook — with the added advantage of being both the developer and the capital markets platform.</div>

        </div>
        <div style={{background:"linear-gradient(135deg,rgba(59,130,246,.10),rgba(59,130,246,.04))",border:"1px solid rgba(59,130,246,.3)",borderTop:"2px solid #3B82F6",borderRadius:2,padding:"22px 20px"}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#60A5FA",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>04 · The Host Nation Strategic Argument</div>
          <div style={{fontSize:15,fontWeight:700,color:"#FFF",lineHeight:1.25,marginBottom:10}}>City Bonds Are the Strongest Signal of Institutional Seriousness to Any Host Government.</div>
          <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75}}>Host governments are skeptical of private city promises precisely because most operators have no track record of raising and deploying institutional capital responsibly. <strong>City Bonds change the conversation entirely.</strong> A city that issues rated, audited, investor-grade debt instruments is not a speculative project — it is a functioning financial institution. This transforms the ICT from a real estate play into an investable counterparty: eligible for co-financing, development bank support, and sovereign credit enhancement. <strong>The Host Nation’s pitch to its Parliament becomes far stronger when the city it is hosting is already managing a billion-dollar AUM financial system.</strong></div>

        <p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>The two phases are not alternatives — they are a compounding sequence. Digital Money establishes the Digital Bank, onboards residents into a yield-bearing relationship, and creates the AUM base. City Bonds convert that AUM into direct infrastructure capital from people already financially integrated, already trusting, already inside the city’s orbit.</p>

    {city:"Singapore",flag:"🇸🇬",color:"#0D9E8E",period:"1965–present",headline:"Engineered from scratch — the most deliberate financial city-state in history",
    body:"Singapore is the most modern case and the most relevant for Tipolis because it was a deliberate political decision, not a historical accident. When Lee Kuan Yew became prime minister of a country without natural resources, without territory, and without economic hinterland, the bet was to build a financial platform that would make the country indispensable to regional capital. In 1968, Singapore created the Asian dollar market, allowing international banks to raise and lend dollars outside US jurisdiction. In 1971, it created the Monetary Authority of Singapore (MAS), combining central bank and regulator in a single body famous for efficiency and predictability. In the following years, Singapore cut corporate taxes, established clear rules for foreign investment, and actively attracted the world's largest banks. The result: a city with nothing but location and institutional quality today hosts more than 120 international banks and competes with Hong Kong and London in global financial center rankings. Singapore's GDP per capita rose from approximately $500 in 1965 to over $80,000 today — the highest in the world. The CPF (Central Provident Fund) created a permanent pool of resident savings deployed into housing and infrastructure bonds. Infrastructure financed by residents; resident savings growing because infrastructure raised asset values. A self-reinforcing loop engineered from scratch.",

            <div style={{fontSize:10,color:"#A78BFA",fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Business Navigator Analysis</div>
            <div style={{fontSize:22,fontFamily:"'Bebas Neue',sans-serif",marginBottom:10}}>Which Business Model Patterns Apply?</div>
            <p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.75,marginBottom:10}}>The <strong>St. Gallen Business Model Navigator</strong> — built from the analysis of over 6,000 corporate transformations — identifies 55 recurring patterns behind every major wave of business innovation. Its core insight is powerful: the most durable competitive advantages rarely originate from new technology alone. They emerge from the <strong>deliberate recombination of proven mechanisms in a new context</strong>. The Navigator does something more valuable than classify what a company already does — it reveals <em>what a company could become</em> by pointing to patterns that have already succeeded at scale elsewhere.</p>
            <p style={{fontSize:13,color:"#7A8A9E",lineHeight:1.75,marginBottom:10}}>For Tipolis, the implications extend well beyond any single initiative. The ICT platform — captive resident base, exclusive jurisdiction, financial infrastructure, and trusted governance contract — is an extraordinarily rich surface for business model expansion. Research by the BCG Henderson Institute shows companies in the top quartile of business model innovation sustain <strong>2–3× higher revenue growth and margin expansion</strong> over 10-year horizons versus product-focused peers. Both Digital Money and City Bonds map onto multiple patterns simultaneously — a signal of structural robustness and the compounding potential of the city-as-platform thesis.</p>
            <div style={{background:"rgba(167,139,250,.06)",border:"1px solid rgba(167,139,250,.2)",borderRadius:2,padding:"18px 22px",marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:"#A78BFA",marginBottom:10}}>The Growth Mandate: Business Model Innovation Is a Survival Strategy</div>
              <p style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75,marginBottom:10}}>The companies that dominate categories over the next decade will be the ones that most aggressively expand the scope of value they deliver to their core customer base. Amazon was a bookstore. Apple was a computer manufacturer. Visa was a bank consortium. Each transformed itself by identifying adjacencies — new products, new partners, new markets — served through the same core customer relationship. The mechanism in every case: a captive, financially-integrated user base that made distribution nearly free, and a platform architecture that let third-party services plug in without the platform owner building from scratch.</p>
              <p style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75,marginBottom:10}}><strong>Tipolis's ICT ecosystem mirrors this architecture exactly.</strong> The resident relationship is the captive base. The Digital Bank financial institution is the platform infrastructure. The regulatory sandbox is the moat. From this position, Digital Money (SATS) and City Bonds (CB) are the first two product layers built on top — and the natural growth trajectory is not to build more products internally but to attract best-in-class partners who want access to a financially-integrated, premium resident community.</p>
              <p style={{fontSize:12,color:"#C8D4E0",lineHeight:1.75}}>Companies that consciously engineer their business model portfolio evolve from operators to platforms — and platforms command valuation multiples that operators never reach. <strong>Every pattern identified below describes both what Digital Money and City Bonds do today, and what the ICT platform can become.</strong></p>

              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:3,textTransform:"uppercase",color:"#FF6B35",marginBottom:4}}>Pattern 01 · Primary Pattern · The Structural Foundation</div>
              <div style={{fontSize:11,color:"#FF6B35",marginBottom:4,fontFamily:"'DM Mono',monospace",letterSpacing:1}}>★ Core Business Model</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#FF6B35",lineHeight:1,marginBottom:12}}>Layer Player</div>
              <div style={{fontSize:13,color:"#C8D4E0",lineHeight:1.75}}>The Layer Player pattern describes a company that <strong>inserts itself into a value chain at the infrastructure layer</strong> — providing the platform or access mechanism through which other businesses operate — without owning or operating the service itself. <strong>Tipolis extracts rent from the layer, not from the product.</strong></div>
              <ul style={{listStyle:"none",padding:0,margin:"12px 0 0"}}>
                {["Tipolis owns the city layer — the resident base, the jurisdiction, the trust relationship. The banking partner owns the financial product layer. This applies to both Digital Money (SATS) and City Bonds (CB): Tipolis never touches the balance sheet of either financial service.","This is the same structural logic as operating systems (Microsoft charges for access to users), real estate landlords (they charge for access to location), and port authorities (they charge for access to the harbor). Tipolis charges for access to the city.","The layer becomes more valuable as more products are built on top of it. SATS and City Bonds are the first two. Each new financial product — credit, insurance, trade finance — increases the value of the layer without requiring additional capital investment from Tipolis.","Tipolis bears zero financial risk of either the SATS stablecoin operation or the City Bond issuance platform. If any Digital Bank product winds down, the layer remains. The city's core asset — its resident base and governance contract — is structurally insulated from any individual product's performance."].map((li,i)=>(

                ))}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
              {[["#0D9E8E","02","Two-Sided Market",[["The Digital Bank connects two distinct groups that would not efficiently transact without the city platform as intermediary: on one side, International Cities that need financial infrastructure and capital; on the other, the citizens and companies within those ICTs who need yield-bearing savings (SATS), investment products (City Bonds), and a trusted payment layer.","Tipolis captures value as the marketplace operator on both sides — earning 0.25% on Digital Money AUM and platform fees on City Bond issuance — because it controls distribution access to both sides simultaneously.","Value grows nonlinearly: more ICTs onboarded → higher SATS AUM and more CB issuances → better Digital Bank economics → more services for residents → more ICTs attracted → more SPV-side demand. Classic two-sided compounding."]]],["#A78BFA","03","White Label",[["The Digital Bank operates the entire back-end for both products — STRC-to-SATS custody, issuance, compliance, settlement for Digital Money; and bond structuring, issuance, and secondary market infrastructure for City Bonds. Tipolis licenses its city brand as the consumer-facing identity for both.","Brand + distribution at near-zero capex. For both SATS and CB, the back-end is the partner's capital and operational risk; the front-end is Tipolis's strategic asset. Residents trust Tipolis, not the underlying financial counterparty.","Allows Tipolis to launch both a fully-featured stablecoin product and a capital markets platform without ever building financial institutions from scratch."]]],["#F5A623","04","Robin Hood",[["Institutional-grade yield (11%+) has historically been exclusive to large fund managers, sovereign wealth funds, and family offices. SATS inverts this barrier: any ICT resident, regardless of wealth, earns Bitcoin-backed returns previously unavailable to them.","City Bonds extend this democratization further: infrastructure investment — historically restricted to qualified institutional investors with minimums of $1M+ — becomes accessible to any ICT resident with $25,000. Residents become co-owners of the city they live in.","This democratization narrative is a powerful acquisition engine for city marketing and resident attraction, and it creates a politically aligned resident base that actively advocates for the city's growth and success."]]],["#2ECC71","05","Subscription / Recurring Revenue",[["Citizens and businesses holding SATS generate a continuous, perpetual AUM base. Tipolis's 0.25% margin is a recurring stream tied to the stock of capital in the system — compounding with AUM growth and each new city launch.","City Bond platform fees create a second recurring revenue stream: each issuance generates structuring and distribution fees, and each subsequent tranche compounds on the credibility established by prior issuances.","The longer residents hold SATS and the more CB tranches they invest in, the deeper their financial integration — creating structural lock-in that reinforces retention and provides a floor on recurring revenue even through economic cycles."]]],["#EF4444","06","Lock-In",[["Once a resident builds credit history, SATS collateral, and city-integrated financial identity, switching to a different financial system carries enormous friction. For businesses, the lock-in is even deeper: payroll in SATS, supplier invoices on city rails, lending relationships with the Digital Bank bank.","City Bond ownership adds another layer: a resident who owns CB instruments backed by the city's own infrastructure has a literal ownership stake in the city's physical assets. Their financial and social identity are fused — switching cost approaches infinity.","This is benevolent lock-in — residents stay because both products are genuinely superior. The switching cost creates a durable AUM floor for SATS and a captive investor pool for future City Bond tranches."]]],["#06B6D4","07","Razor & Blade",[["The city residency is the razor — offered at a compelling value proposition. The ongoing financial services — SATS yield accounts and City Bond investment products — are the high-margin blades. The initial city membership cost is justified by the financial services value alone.","Every year of residency is a year of 10% SATS yield compounding in the resident's account. Every CB tranche issued compounds the resident's portfolio through the fixed coupon plus Bitcoin appreciation upside. Each blade sharpens the other.","As the Digital Bank expands, additional blades emerge: credit products, insurance, trade finance, wealth management, private placements. The razor (city residency) never loses its edge because each new blade makes the full suite more valuable than any competitor can match from a standing start."]]]].map(([c,n,name,items])=>(

<h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(28px,4vw,42px)",lineHeight:.95,marginBottom:10}}>New Product Development — Where Is Each Initiative Today?</h2>
        <p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.75,marginBottom:20}}>The NPD (New Product Development) framework maps the journey from idea to launch across seven stages. Tracking each initiative on this axis removes ambiguity: it shows what has already been validated, what decisions remain, and what execution is required. Critically, it reveals that Tipolis is not at Stage 1 for any of these initiatives — significant validation work has already been done.</p>

                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,color:ini.color,minWidth:140,flexShrink:0}}>{ini.label}</div>
                      <div style={{fontSize:11,color:"#C8D4E0",lineHeight:1.65}}>{ini.note}</div>
                    </div>
                  </div>
                );
              })}
            </div>

        })()}
        <div style={{background:"rgba(245,166,35,.06)",border:"1px solid rgba(245,166,35,.2)",borderRadius:2,padding:"12px 16px",fontSize:12,color:"#C8D4E0",lineHeight:1.75,marginTop:8}}>
          <strong style={{color:"#F5A623"}}>Key takeaway:</strong> The NPD stages are a deliberate sequence, not a coincidence. STRC has completed Strategy & Business Analysis — execution is a board decision away. SATS is at Idea Screening — concept proven, structure next. City Bonds are at Idea Generation — the idea is sound, execution waits for SATS to create the distribution infrastructure.

      <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:10,color:"#7A8A9E"}}>Strategic Compounding</div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(34px,5vw,54px)",lineHeight:.95,marginBottom:14}}>The Flywheel Effect</h2>
      <p style={{fontSize:14,color:"#C8D4E0",lineHeight:1.8,marginBottom:18}}>The flywheel begins <strong>before SATS exists</strong>. Once Tipolis adopts STRC in its own treasury, it unlocks three things at once: more cash flow, direct operating familiarity with the instrument, and a credible proof point that the same balance-sheet logic can be offered externally through Digital Money. <strong>STRC Treasury, Digital Money, and City Bonds are one capital chain, not three separate products.</strong></p>
      <div style={{background:"rgba(255,107,53,.06)",border:"1px solid rgba(255,107,53,.2)",borderRadius:2,padding:"16px 18px",marginBottom:22}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",color:"#FF6B35",marginBottom:8}}>Chain Logic</div>
        <div style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8}}><strong>STRC in treasury</strong> increases internal yield and validates the asset → that validation supports <strong>SATS issuance</strong> and makes Digital Money believable to residents and partners → growing <strong>SATS AUM</strong> creates recurring fee income and a captive investor base → that investor base enables <strong>City Bonds</strong> to finance infrastructure at lower distribution cost → better infrastructure attracts more residents, businesses, deposits, and corporate cash balances → the city's treasury expands, allowing larger future STRC allocations and restarting the cycle at a higher level.</div>
      </div>
      <div ref={fwRef} style={{margin:"36px 0"}}>
        <CircularFlywheel vis={fwVis}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:14,opacity:fwVis?1:0,transition:"opacity .7s ease .4s"}}>
          <div style={{background:"rgba(255,107,53,0.06)",border:"1px solid rgba(255,107,53,0.2)",borderRadius:2,padding:"14px 18px"}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",color:"#FF6B35",marginBottom:8}}>01 · STRC Treasury</div>
            <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.7}}><strong>Tipolis moves idle cash into STRC</strong> and immediately earns more than T-Bills. That higher treasury cash flow does more than improve returns: it proves that STRC can be monitored, trusted, and operationalized inside the company itself. Treasury adoption becomes the internal validation layer for everything that follows.</div>
          </div>
          <div style={{background:"rgba(245,166,35,0.06)",border:"1px solid rgba(245,166,35,0.2)",borderRadius:2,padding:"14px 18px"}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",color:"#F5A623",marginBottom:8}}>02 · Digital Money</div>
            <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.7}}><strong>The same STRC logic is then externalized through SATS.</strong> What worked on Tipolis's own balance sheet becomes a resident-facing digital dollar. As SATS balances grow, Tipolis earns recurring AUM-linked economics, the Digital Bank gains operating scale, and the city accumulates a large pool of financially engaged users instead of passive residents.</div>
          </div>
          <div style={{background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:2,padding:"14px 18px"}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",color:"#3B82F6",marginBottom:8}}>03 · City Bonds</div>
            <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.7}}><strong>SATS AUM becomes the distribution engine for City Bonds.</strong> Residents and businesses already holding SATS are the natural first buyers of city infrastructure paper. Bond proceeds build the city; a better city attracts more residents, business activity, and treasury balances; those new balances feed back into STRC adoption and into the next SATS and City Bond cycle.</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24,opacity:fwVis?1:0,transition:"opacity .7s ease .55s"}}>
          <div style={{background:"rgba(245,166,35,0.06)",border:"1px solid rgba(245,166,35,0.2)",borderRadius:2,padding:"14px 18px"}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",color:"#F5A623",marginBottom:8}}>🟡 Treasury → Digital Money Loop</div>
            <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.7}}><strong>More treasury yield creates more confidence and optionality.</strong> More confidence makes SATS easier to launch. SATS growth creates recurring fee income and a stronger financial brand. A stronger financial brand attracts more users and more capital into the ecosystem, which increases the amount of treasury and resident capital that can be allocated back into STRC-supported structures.</div>
          </div>
          <div style={{background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:2,padding:"14px 18px"}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",color:"#3B82F6",marginBottom:8}}>🔵 Digital Money → City Bonds Loop</div>
            <div style={{fontSize:12,color:"#C8D4E0",lineHeight:1.7}}><strong>SATS converts savers into infrastructure investors.</strong> AUM lowers the distribution cost of City Bonds, City Bonds finance visible city improvements, and those improvements make the jurisdiction more desirable. The result is a larger resident base, more business deposits, more SATS demand, and a deeper capital market each time the loop turns. <strong>The city becomes its own balance sheet, bank, and market of demand.</strong></div>
          </div>
        </div>
      </div>

      {/* Why Now */}      <div style={{height:1,background:"rgba(255,255,255,.05)",margin:"36px 0"}}/>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:10,color:"#2ECC71"}}>Historical Proof</div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(34px,5vw,54px)",lineHeight:.95,marginBottom:14}}>Past Cities &<br/>One Proven<br/>Pattern.</h2>
      <p style={{fontSize:14,color:"#C8D4E0",lineHeight:1.8,marginBottom:36}}>The combination of strong jurisdiction, real estate and urban infrastructure, and capital markets is not a theory — it is the common pattern behind every great city-state in history. Venice, Genoa, Amsterdam, Hong Kong, Singapore: each grew not because of geography or resources, but because it built financial infrastructure that made living and operating inside its walls materially better than anywhere else. The physical city followed the financial city — always, not the other way around.</p>

      <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:10,color:"#FF6B35"}}>Strategic Decision Framework</div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(34px,5vw,54px)",lineHeight:.95,marginBottom:14}}>A Strategic<br/><span style={{color:"#FF6B35"}}>Decision Framework</span></h2>
      <p style={{fontSize:14,color:"#C8D4E0",lineHeight:1.8,marginBottom:36}}>The world is shifting faster than most institutional plans account for. Bitcoin is becoming a reserve asset. Digital money is being raced by sovereign governments. Private cities are gaining institutional legitimacy globally. This framework examines where Tipolis stands in this environment — and what the cost of inaction is.</p>
      {[
        {n:"01",color:"#FF6B35",title:"Market Timing — The Window Is Open. It Will Not Stay Open.",body:<><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>The yield-bearing stablecoin market is in its early formation phase. Ethena's USDe proved the demand exists, growing from $0 to $5.6B in 12 months. Tether and Circle still do not yield-pass to holders. The US GENIUS Act (2025) created the first regulatory framework for stablecoin issuers. Abu Dhabi's ADGM is actively licensing. The EU's MiCA framework is live. <strong>Regulation is forming, competition is sparse, and the market narrative is favorable. This is the optimal entry window.</strong></p><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8}}>In 18–24 months, this window will be more crowded. The institutional credibility of the first-mover in a specific distribution channel — private cities — will be harder to establish from behind. The question for Tipolis is not whether this market will exist. <strong>The question is whether Tipolis will define it, or follow someone who did.</strong></p></>},
        {n:"02",color:"#F5A623",title:"Distance from Core — Critical Adjacency, Not Mission Drift",body:<><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>Financial infrastructure is not Tipolis's core business — city development is. But this is not a pivot. It is a <strong>critical adjacency</strong>: same customers, same jurisdiction, same trust relationship, different product layer. The governance model, resident base, and city platform are fully reused. The financial layer plugs in via Digital Bank — capital-light, operationally separate, and structurally insulated from the city's core P&L.</p><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8}}>The trust embedded in a contractual city relationship is precisely what makes SATS distribution possible at near-zero customer acquisition cost. No standalone fintech startup can replicate that. <strong>This adjacency is not a distraction from the core. It is the core's most powerful amplifier.</strong></p></>},
        {n:"03",color:"#2ECC71",title:"ICT Performance Metrics — What SATS Does to the Numbers That Matter",body:<><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>The financial model is documented, not theoretical. At <strong>$500M SATS AUM</strong>: Tipolis earns $1.25M/year in recurring Digital Bank revenue at zero operational cost. At <strong>$2B AUM</strong> across multiple ICTs: $5M/year, compounding with every new city launch. At <strong>$5B AUM</strong>: $12.5M/year — before City Bond platform fees. Direct operation at that scale multiplies the margin 4–8×.</p><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>The ICT-level KPIs compound this story. <strong>SATS integration reduces resident churn:</strong> financially integrated residents hold switching costs that lifestyle-only residents never develop — their savings, credit history, and city-native financial identity are embedded in the platform. <strong>SATS yield offsets residency membership cost:</strong> a resident earning 10% on $50K in SATS earns $5K/year, meaningfully closing the gap on their annual membership fee — improving both retention and willingness-to-pay at the margin. <strong>SATS CAC is structurally near zero:</strong> residents adopt financial products from a trusted city institution, not a cold-start startup. No marketing budget replicates that trust.</p><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8}}>Most critically: <strong>SATS AUM is the pre-qualified City Bond investor pool.</strong> At $2B in SATS AUM, a 10% CB allocation represents $200M in infrastructure capital raised from the city's own residents — at zero distribution cost. That is not a product feature. That is a structural financing advantage over every conventional city developer on Earth.</p></>},
        {n:"04",color:"#A78BFA",title:"Why This Is Survival, Not Just Opportunity",body:<><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>International Cities compete not on geography but on the quality of environment and financial infrastructure they offer. <strong>This dimension is becoming a primary competitive axis — rapidly.</strong> The US Strategic Bitcoin Reserve (2025), the CLARITY Act, the GENIUS Act's stablecoin framework, and Strategy's redefinition of institutional credit are not isolated events. They are the opening moves of a structural shift in how global capital is stored, allocated, and priced over the next 30 years.</p><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8,marginBottom:10}}>BRICS Pay, China's mBridge, the Digital Euro, and a dozen sovereign CBDC initiatives confirm what every major government already understands: <strong>the settlement rails of the next three decades are being built right now.</strong> Tipolis can build private, yield-bearing, dollar-denominated financial infrastructure that outcompetes every CBDC on yield, stability, accessibility, and governance — without any government's permission or political risk.</p><p style={{fontSize:13,color:"#C8D4E0",lineHeight:1.8}}>International Cities that move first establish the financial brand residents choose. Those that wait will find the best residents already committed to whoever moved. <strong>Tipolis has a narrow window to be among the first private city operators in the world to make this statement credibly. The cost of moving is near-zero. The cost of waiting compounds every quarter.</strong></p></>},
      ].map(({n,color,title,body})=>(
        <div key={n} style={{display:"flex",gap:20,marginBottom:32,alignItems:"flex-start"}}>
