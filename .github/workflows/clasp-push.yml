name: Push Apps Script to Google

# Deploys the Tipolis Press Monitor backend to the live Apps Script project
# whenever .gs files (or the manifest) change on main. The workflow also runs
# on manual dispatch so the owner can re-sync at will from the Actions tab.
#
# Required setup (one time):
#   1. Enable the Apps Script API at https://script.google.com/home/usersettings
#   2. Generate clasp credentials (see press-research-communications/apps-script/README.md)
#   3. Add the contents of ~/.clasprc.json as a GitHub Secret named CLASPRC_JSON
#   4. Replace PASTE_YOUR_SCRIPT_ID_HERE in apps-script/.clasp.json with the
#      Script ID from Apps Script → Project Settings.

on:
  push:
    branches: [main]
    paths:
      - 'press-research-communications/apps-script/**'
      - '.github/workflows/clasp-push.yml'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Missing CLASPRC_JSON secret. See press-research-communications/apps-script/README.md."
            exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Verify scriptId is configured
        working-directory: press-research-communications/apps-script
        run: |
          if grep -q "PASTE_YOUR_SCRIPT_ID_HERE" .clasp.json; then
            echo "::error::.clasp.json still has the placeholder scriptId. Replace it with the Apps Script project's Script ID."
            exit 1
          fi

      - name: Push to Apps Script
        working-directory: press-research-communications/apps-script
        run: clasp push --force
